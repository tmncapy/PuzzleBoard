<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <title>Bảng Điều Khiển Ô Chữ (Kỹ Thuật)</title>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: #1a1a1a;
            color: #fff;
            padding: 20px;
            margin: 0;
            box-sizing: border-box;
        }

        h2 {
            color: #5ac8fa;
            margin-top: 0;
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 1px;
            text-align: center;
        }

        /* Bố cục chia 3 cột chính nằm ngang */
        .main-layout {
            display: grid;
            grid-template-columns: 1fr 1fr 1.1fr;
            gap: 20px;
            align-items: start;
        }

        /* Khung bao bọc phân vùng khoa học */
        .section-wrapper {
            background: #262626;
            border: 1px solid #3a3a3a;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
        }

        h3 {
            margin-top: 0;
            margin-bottom: 15px;
            border-bottom: 2px solid #3a3a3a;
            padding-bottom: 8px;
            color: #5ac8fa;
            font-size: 15px;
            text-transform: uppercase;
        }

        .group {
            display: flex;
            gap: 8px;
            margin-bottom: 10px;
            flex-wrap: wrap;
            align-items: center;
        }

        .group-center {
            justify-content: center;
        }

        button {
            padding: 10px 14px;
            font-weight: bold;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.2s ease;
        }

        button:hover {
            opacity: 0.9;
            transform: translateY(-1px);
        }

        /* Định nghĩa màu sắc cố định theo thiết kế gốc */
        .btn-main { background-color: #27ae60; color: white; }
        .btn-excel { background-color: #8e44ad; color: white; width: 100%; padding: 12px; }
        .btn-reveal { background-color: #2980b9; color: white; }
        .btn-reset { background-color: #ff00ff; color: white; }
        .btn-tossup, .btn-solve { background-color: #f1c40f; color: black; flex: 1; }
        .btn-quiz { background-color: #34495e; color: white; width: calc(33.33% - 6px); box-sizing: border-box; }
        .btn-time-30 { background-color: #2980b9; color: white; }
        .btn-time-10 { background-color: #27ae60; color: white; }

        .btn-letter {
            background-color: #8e44ad;
            color: #fff;
            width: calc(14.28% - 6px);
            padding: 10px 0;
            font-size: 14px;
            border-radius: 4px;
            text-align: center;
        }

        .btn-letter:disabled {
            background-color: #444 !important;
            color: #777 !important;
            cursor: not-allowed;
            transform: none !important;
        }

        .active {
            background-color: #ff3b30 !important;
            color: white !important;
            box-shadow: 0 0 12px #ff3b30;
        }

        /* Cấu trúc bảng điểm theo hàng dọc dọc */
        .score-panel {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .player-ctrl-box {
            background: #333;
            border: 1px solid #444;
            border-radius: 6px;
            padding: 10px;
        }

        .player-ctrl-box h4 {
            margin: 0 0 8px 0;
            color: #ffcc00;
            font-size: 13px;
            text-transform: uppercase;
        }

        .ctrl-row {
            display: flex;
            gap: 5px;
            margin-bottom: 6px;
        }

        .ctrl-input {
            flex: 1;
            padding: 6px;
            border-radius: 4px;
            border: 1px solid #555;
            background: #1a1a1a;
            color: #fff;
            font-weight: bold;
            text-align: center;
            font-size: 12px;
            min-width: 0;
        }

        .score-actions {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 4px;
        }

        .score-actions button {
            padding: 5px 0;
            font-size: 11px;
        }

        .input-manual {
            padding: 8px;
            font-size: 13px;
            font-weight: bold;
            width: 100%;
            border-radius: 6px;
            border: 1px solid #444;
            background: #1a1a1a;
            color: white;
            text-transform: uppercase;
            box-sizing: border-box;
            resize: vertical;
        }

        /* Trạng thái đệm popup alert */
        .custom-popup-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.8);
            z-index: 1000;
            justify-content: center; align-items: center;
        }

        .custom-popup-box {
            background: #2b2b2b;
            border: 2px solid #5ac8fa;
            padding: 20px 30px;
            border-radius: 8px;
            max-width: 380px;
            text-align: center;
        }

        .custom-popup-msg {
            font-size: 15px;
            margin-bottom: 15px;
            font-weight: bold;
        }

        .custom-popup-btn {
            background: #5ac8fa;
            color: #000;
            padding: 8px 25px;
            font-weight: bold;
            border-radius: 4px;
        }
    </style>
</head>

<body>

    <h2>BẢNG ĐIỀU KHIỂN TRÒ CHƠI (REALTIME)</h2>

    <div class="main-layout">
        
        <div class="column">
            <div class="section-wrapper">
                <h3>1. Nạp File Excel</h3>
                <button class="btn-excel" onclick="document.getElementById('excelInput').click()">NẠP FILE DỮ LIỆU EXCEL</button>
                <input type="file" id="excelInput" accept=".xlsx, .xls" style="display:none;" onchange="handleExcel(this)">
            </div>

            <div class="section-wrapper">
                <h3>2. Chọn Đề Thi</h3>
                <div class="group" style="gap: 8px 6px;">
                    <script>
                        for (let i = 1; i <= 12; i++) {
                            document.write(`<button class="btn-quiz" id="btnQuiz${i}" onclick="loadQuizFromExcel(${i - 1})">ĐỀ ${i}</button>`);
                        }
                    </script>
                </div>
            </div>

            <div class="section-wrapper">
                <h3>3. Nhập Từ Khóa Thủ Công</h3>
                <textarea id="manualTextInput" class="input-manual" rows="3" placeholder="DÒNG 1&#10;DÒNG 2&#10;DÒNG 3..."></textarea>
                <button class="btn-main" style="width: 100%; margin-top: 8px; padding: 12px 0;" onclick="sendManualText()">SHOW CHỮ LÊN BẢNG</button>
            </div>
        </div>

        <div class="column">
            <div class="section-wrapper">
                <h3>4. Luồng Chạy Bảng Chính</h3>
                <div class="group" style="display: grid; grid-template-columns: 1fr 1fr; gap: 8px;">
                    <button class="btn-main" style="grid-column: span 2; padding: 12px 0;" onclick="sendCmd('SHOW_BOARD')">SHOW Ô CHỮ CHÍNH</button>
                    <button style="background-color: #2980b9; color: white;" onclick="sendCmd('SHOW_THUMBNAIL')">HIỆN THUMBNAIL</button>
                    <button style="background-color: #7f8c8d; color: white;" onclick="sendCmd('HIDE_THUMBNAIL')">ẨN THUMBNAIL</button>
                </div>
            </div>

            <div class="section-wrapper">
                <h3>5. Vòng Lật Ô Nhanh (Toss-Up)</h3>
                <div class="group" style="margin-bottom: 8px;">
                    <button class="btn-tossup" id="startBtn" onclick="clickStartTossup()">START</button>
                    <button class="btn-tossup" id="pauseBtn" onclick="clickPauseTossup()">PAUSE</button>
                    <button class="btn-tossup" id="playBtn" onclick="clickPlayTossup()">PLAY</button>
                </div>
                <button class="btn-solve" id="solveBtn" style="width: 100%; padding: 10px 0;" onclick="solveTossUp()">GIẢI ĐÁP TOSS-UP (SOLVE)</button>
            </div>

            <div class="section-wrapper" style="background: #1f1f1f;">
                <h3>6. Âm Thanh SFX & Khẩn Cấp</h3>
                                <div class="group" style="display: grid; grid-template-columns: 1fr 1fr; gap: 6px; margin-bottom: 12px; max-height: 450px; overflow-y: auto; padding-right: 4px;">
                    <!-- Hệ Thống & Đoán Ô Chữ -->
                    <button style="background-color: #2ecc71; color: white;" onclick="sendCmd('PLAY_SFX', 'ding.mp3')">🔔 DING (ĐÚNG CHỮ)</button>
                    <button style="background-color: #d63031; color: white;" onclick="sendCmd('PLAY_SFX', 'wrong.mp3')">❌ SAI (Wrong)</button>
                    <button style="background-color: #34495e; color: white;" onclick="sendCmd('PLAY_SFX', 'reveal.mp3')">🎬 SOUND SHOW BẢNG</button>
                    <button style="background-color: #1abc9c; color: white;" onclick="sendCmd('PLAY_SFX', 'ClearPuzzle.mp3')">🎉 THẮNG VÒNG CHÍNH</button>
                    
                    <!-- Nhạc Nền Toss-Up -->
                    <button style="background-color: #e67e22; color: white;" onclick="sendCmd('PLAY_SFX', 'TossUpStart.mp3')">⏱️ BẮT ĐẦU TOSS-UP</button>
                    <button style="background-color: #e67e22; color: white;" onclick="sendCmd('PLAY_SFX', 'tossup.mp3')">🎵 NHẠC NỀN TOSS-UP</button>
                    <button style="background-color: #f1c40f; color: black;" onclick="sendCmd('PLAY_SFX', 'toss.mp3')">🪙 TOSS SOUND</button>
                    <button style="background-color: #f1c40f; color: black;" onclick="sendCmd('PLAY_SFX', 'tosssound.mp3')">🔊 TOSS SOUND 2</button>
                    <button style="background-color: #9b59b6; color: white; grid-column: span 2;" onclick="sendCmd('PLAY_SFX', 'ClearTossUp.mp3')">🏆 CHIẾN THẮNG TOSS-UP</button>

                    <!-- Nhạc Hẹn Giờ & Suy Nghĩ -->
                    <button style="background-color: #3498db; color: white;" onclick="sendCmd('PLAY_SFX', '10s.mp3')">⏳ ĐẾM NGƯỢC 10S</button>
                    <button style="background-color: #3498db; color: white;" onclick="sendCmd('PLAY_SFX', '30s.mp3')">⏱️ ĐẾM NGƯỢC 30S</button>
                    <button style="background-color: #2c3e50; color: white;" onclick="sendCmd('PLAY_SFX', 'think.mp3')">🤔 SUY NGHĨ 1</button>
                    <button style="background-color: #2c3e50; color: white;" onclick="sendCmd('PLAY_SFX', 'think1.mp3')">🧠 SUY NGHĨ 2</button>

                    <!-- Vòng Bonus (Đề 10-12) -->
                    <button style="background-color: #2ecc71; color: white;" onclick="sendCmd('PLAY_SFX', 'BonusPuzzle.mp3')">🧩 HIỆN Ô CHỮ BONUS</button>
                    <button style="background-color: #9b59b6; color: white;" onclick="sendCmd('PLAY_SFX', 'LetterBonus.mp3')">✨ LẬT CHỮ BONUS</button>
                    <button style="background-color: #f39c12; color: white;" onclick="sendCmd('PLAY_SFX', '10sBonus.mp3')">⏳ SUY NGHĨ 10S BONUS</button>
                    <button style="background-color: #3498db; color: white;" onclick="sendCmd('PLAY_SFX', '30sBonus.mp3')">⏱️ NHẠC 30S BONUS</button>
                    <button style="background-color: #27ae60; color: white;" onclick="sendCmd('PLAY_SFX', 'ClearBonus.mp3')">🌟 ĐÚNG BONUS</button>
                    <button style="background-color: #27ae60; color: white;" onclick="sendCmd('PLAY_SFX', 'bonussolve.mp3')">💎 GIẢI ĐÁP BONUS WIN</button>
                    <button style="background-color: #c0392b; color: white; grid-column: span 2;" onclick="sendCmd('PLAY_SFX', 'FailBonus.mp3')">💥 SAI BONUS (HIỆN HẾT CHỮ)</button>

                    <!-- Hiệu Ứng Vòng Quay & Ô Đặc Biệt -->
                    <button style="background-color: #7f8c8d; color: white;" onclick="sendCmd('PLAY_SFX', 'speedup.mp3')">⚡ SPEED UP</button>
                    <button style="background-color: #d35400; color: white;" onclick="sendCmd('PLAY_SFX', 'finalspin.mp3')">🔄 FINAL SPIN</button>
                    <button style="background-color: #d35400; color: white;" onclick="sendCmd('PLAY_SFX', 'SpinFinal.mp3')">🎡 SPIN FINAL 2</button>
                    <button style="background-color: #16a085; color: white;" onclick="sendCmd('PLAY_SFX', 'mystery.mp3')">❓ Ô BÍ ẨN (MYSTERY)</button>
                    <button style="background-color: #c0392b; color: white;" onclick="sendCmd('PLAY_SFX', 'bankrupt.mp3')">📉 MẤT ĐIỂM (BANKRUPT)</button>
                    <button style="background-color: #c0392b; color: white;" onclick="sendCmd('PLAY_SFX', 'horn.mp3')">📯 TIẾNG CÒI (HORN)</button>

                    <!-- Nhạc Nền Sân Khấu & Bed Music -->
                    <button style="background-color: #2c3e50; color: white;" onclick="sendCmd('PLAY_SFX', 'ExpressBed.mp3')">🚂 EXPRESS BED</button>
                    <button style="background-color: #2c3e50; color: white;" onclick="sendCmd('PLAY_SFX', 'FinalSpinBed.mp3')">🎵 FINAL SPIN BED</button>
                    <button style="background-color: #7f8c8d; color: white;" onclick="sendCmd('PLAY_SFX', 'final.mp3')">🏁 FINAL MUSIC</button>
                    <button style="background-color: #2c3e50; color: white;" onclick="sendCmd('PLAY_SFX', 'theme.mp3')">🎶 GAME THEME</button>

                    <!-- Nhạc Mở Đầu & Giới Thiệu -->
                    <button style="background-color: #111; color: #5ac8fa; border: 1px solid #5ac8fa;" onclick="sendCmd('PLAY_SFX', 'OpeningTheme.mp3')">🎼 OPENING THEME</button>
                    <button style="background-color: #111; color: #5ac8fa; border: 1px solid #5ac8fa;" onclick="sendCmd('PLAY_SFX', 'intro.mp3')">🎙️ INTRO MAIN</button>
                    <button style="background-color: #111; color: #5ac8fa; border: 1px solid #5ac8fa;" onclick="sendCmd('PLAY_SFX', 'intro1.mp3')">🎙️ INTRO 1</button>
                    <button style="background-color: #111; color: #5ac8fa; border: 1px solid #5ac8fa;" onclick="sendCmd('PLAY_SFX', 'intro2.mp3')">🎙️ INTRO 2</button>
                    <button style="background-color: #8e44ad; color: white;" onclick="sendCmd('PLAY_SFX', 'showprize.mp3')">🎁 SHOW GIẢI THƯỞNG</button>
                    <button style="background-color: #2c3e50; color: white;" onclick="sendCmd('PLAY_SFX', 'i6.mp3')">🎵 INTERLUDE 6</button>

                    <!-- Hiển Thị Ô Chữ Khác -->
                    <button style="background-color: #34495e; color: white;" onclick="sendCmd('PLAY_SFX', 'showpuzzle.mp3')">🧩 SHOW PUZZLE 1</button>
                    <button style="background-color: #34495e; color: white;" onclick="sendCmd('PLAY_SFX', 'showpuzzle2.mp3')">🧩 SHOW PUZZLE 2</button>
                    <button style="background-color: #34495e; color: white;" onclick="sendCmd('PLAY_SFX', 'showpuzzle3.mp3')">🧩 SHOW PUZZLE 3</button>
                    <button style="background-color: #34495e; color: white;" onclick="sendCmd('PLAY_SFX', 'showpuzzle4.mp3')">🧩 SHOW PUZZLE 4</button>

                    <!-- Tín Hiệu Đèn Kỹ Thuật -->
                    <button style="background-color: #ecf0f1; color: black; font-weight: bold;" onclick="sendCmd('PLAY_SFX', 'FlashWhite.mp3')">⚪ ĐÈN FLASH TRẮNG</button>
                    <button style="background-color: #2ecc71; color: white; font-weight: bold;" onclick="sendCmd('PLAY_SFX', 'FlashGreen.mp3')">🟢 ĐÈN FLASH XANH</button>
                    <button style="background-color: #e74c3c; color: white; font-weight: bold; grid-column: span 2;" onclick="sendCmd('PLAY_SFX', 'FlashRed.mp3')">🔴 ĐÈN FLASH ĐỎ</button>
                    <button style="background-color: #e74c3c; color: white;" onclick="sendCmd('PLAY_SFX', 'red.mp3')">🚨 ĐÈN ĐỎ CẢNH BÁO</button>
                </div>
                <div style="display: flex; flex-direction: column; gap: 6px; border-top: 1px solid #444; padding-top: 10px;">
                    <button class="btn-reveal" style="background-color: #c0392b; padding: 10px 0;" onclick="sendCmd('REVEAL_ALL')">🔓 MỞ HẾT TOÀN BỘ Ô CHỮ</button>
                    <button style="background-color: #f1c40f; color: black;" onclick="sendCmd('STOP_ALL_SFX')">🛑 DỪNG TẤT CẢ ÂM THANH</button>
                    <button class="btn-reset" style="padding: 8px 0;" onclick="sendCmd('RESET_BOARD')">♻️ RESET BẢNG TRỐNG</button>
                </div>
            </div>
        </div>

        <div class="column">
            <div class="section-wrapper">
                <h3>7. Điểm Số & Tên Người Chơi</h3>
                <div class="score-panel">
                    <div class="player-ctrl-box">
                        <h4>Người Chơi 1</h4>
                        <div class="ctrl-row">
                            <input type="text" id="pName1" class="ctrl-input" value="Player 1" placeholder="Tên" oninput="updateScoreboard()">
                            <input type="number" id="pScore1" class="ctrl-input" value="0" placeholder="Điểm" oninput="updateScoreboard()">
                        </div>
                        <div class="score-actions">
                            <button style="background-color: #2ecc71; color: white;" onclick="modifyScore(1, 50)">+50</button>
                            <button style="background-color: #27ae60; color: white;" onclick="modifyScore(1, 100)">+100</button>
                            <button style="background-color: #f39c12; color: white;" onclick="modifyScore(1, 'x2')">x2</button>
                            <button style="background-color: #c0392b; color: white;" onclick="modifyScore(1, '0')">Mất(0)</button>
                        </div>
                    </div>

                    <div class="player-ctrl-box">
                        <h4>Người Chơi 2</h4>
                        <div class="ctrl-row">
                            <input type="text" id="pName2" class="ctrl-input" value="Player 2" placeholder="Tên" oninput="updateScoreboard()">
                            <input type="number" id="pScore2" class="ctrl-input" value="0" placeholder="Điểm" oninput="updateScoreboard()">
                        </div>
                        <div class="score-actions">
                            <button style="background-color: #2ecc71; color: white;" onclick="modifyScore(2, 50)">+50</button>
                            <button style="background-color: #27ae60; color: white;" onclick="modifyScore(2, 100)">+100</button>
                            <button style="background-color: #f39c12; color: white;" onclick="modifyScore(2, 'x2')">x2</button>
                            <button style="background-color: #c0392b; color: white;" onclick="modifyScore(2, '0')">Mất(0)</button>
                        </div>
                    </div>

                    <div class="player-ctrl-box">
                        <h4>Người Chơi 3</h4>
                        <div class="ctrl-row">
                            <input type="text" id="pName3" class="ctrl-input" value="Player 3" placeholder="Tên" oninput="updateScoreboard()">
                            <input type="number" id="pScore3" class="ctrl-input" value="0" placeholder="Điểm" oninput="updateScoreboard()">
                        </div>
                        <div class="score-actions">
                            <button style="background-color: #2ecc71; color: white;" onclick="modifyScore(3, 50)">+50</button>
                            <button style="background-color: #27ae60; color: white;" onclick="modifyScore(3, 100)">+100</button>
                            <button style="background-color: #f39c12; color: white;" onclick="modifyScore(3, 'x2')">x2</button>
                            <button style="background-color: #c0392b; color: white;" onclick="modifyScore(3, '0')">Mất(0)</button>
                        </div>
                    </div>
                </div>
            </div>

            <div id="alphabetSection" class="section-wrapper" style="display: none;">
                <h3>8. Bàn Phím & Điều Hướng Ô Chữ</h3>
                <div class="group group-center" id="alphabetContainer" style="gap: 4px;"></div>

                <div style="border-top: 1px solid #444; padding-top: 10px; margin-top: 10px;">
                    <div class="group group-center" style="margin-bottom: 8px;">
                        <label style="font-weight: bold; color: aqua; font-size: 11px;">MỞ ĐỒNG THỜI:</label>
                        <input type="number" id="numCells" style="font-weight: bold; padding: 4px; width: 45px; text-align: center; border-radius: 4px; border:1px solid #666; background:#1a1a1a; color:#fff;" min="0" max="52" oninput="generateChildTextBoxes()">
                        <div id="childTextBoxes" style="display:inline-flex; gap: 3px; max-width: 140px; overflow-x: auto;"></div>
                    </div>
                    <div class="group group-center">
                        <button class="btn-reset" style="background-color:#9b59b6; padding: 8px 10px; font-size: 11px;" onclick="triggerSequence('MARK_SEQ')">LẦN 1 (DẤU)</button>
                        <button class="btn-reset" style="background-color:#e67e22; padding: 8px 10px; font-size: 11px;" onclick="triggerSequence('REVEAL_SEQ')">LẦN 2 (MỞ)</button>
                    </div>
                </div>

                <div id="extraLettersSection" style="display: none; margin-top: 10px; border-top: 1px dashed #5ac8fa; padding-top: 10px;">
                    <div class="group group-center" style="margin-bottom: 8px;">
                        <div id="extraLettersContainer" style="display: inline-block;">
                            <script>
                                for (let i = 0; i < 5; i++) {
                                    document.write('<input type="text" maxlength="1" class="extra-letter-input" style="width: 24px; height: 24px; font-weight: bold; text-align: center; font-size: 13px; margin: 0 1px; text-transform: uppercase; border-radius: 4px; border: 1px solid #555; background:#1a1a1a; color:#fff;">');
                                }
                            </script>
                        </div>
                        <button style="background-color: green; color: white; padding: 5px 8px; font-size: 11px;" onclick="confirmExtraLetters()">OK</button>
                        <button style="background-color: #7f8c8d; color: white; padding: 5px 8px; font-size: 11px;" onclick="clearExtraLetters()">XÓA</button>
                    </div>
                    
                    <div class="group group-center">
                        <button class="btn-time-30" style="padding: 6px 10px; font-size: 11px;" onclick="sendCmd('PLAY_TIMER', 30)">HẸN GIỜ 30S</button>
                        <button class="btn-time-10" style="padding: 6px 10px; font-size: 11px;" onclick="sendCmd('PLAY_TIMER', 10)">HẸN GIỜ 10S</button>
                    </div>
                </div>
            </div>
        </div>

    </div>

    <div id="customPopup" class="custom-popup-overlay">
        <div class="custom-popup-box">
            <p id="popupMessage" class="custom-popup-msg"></p>
            <button class="custom-popup-btn" onclick="closePopup()">OK</button>
        </div>
    </div>

    <script>
        var SUPABASE_URL = "https://tukabyhjmcyptuwmwedp.supabase.co";
        var SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InR1a2FieWhqbWN5cHR1d213ZWRwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA0NDk3NDksImV4cCI6MjA5NjAyNTc0OX0.gNWdvZ_hRdon_w_KL3C3eXFFiV_EoA4eLgikcYb6dpQ";

        var supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        const channel = supabaseClient.channel('crossword_broadcast_room', {
            config: { broadcast: { ack: false, self: false } }
        });
        channel.subscribe();

        let tossupTimeout = null;
        let isTossupRunning = false;
        let controlActiveQuizLetters = []; 
        let controlRevealedStates = new Array(52).fill(false); 

        function updateScoreboard() {
            const data = {
                p1: { name: document.getElementById("pName1").value, score: parseInt(document.getElementById("pScore1").value) || 0 },
                p2: { name: document.getElementById("pName2").value, score: parseInt(document.getElementById("pScore2").value) || 0 },
                p3: { name: document.getElementById("pName3").value, score: parseInt(document.getElementById("pScore3").value) || 0 }
            };
            sendCmd("UPDATE_SCOREBOARD", data);
        }

        function modifyScore(playerNum, action) {
            const scoreInput = document.getElementById(`pScore${playerNum}`);
            let currentScore = parseInt(scoreInput.value) || 0;
            if (action === 50) currentScore += 50;
            else if (action === 100) currentScore += 100;
            else if (action === 'x2') currentScore *= 2;
            else if (action === '0') currentScore = 0;
            scoreInput.value = currentScore;
            updateScoreboard();
        }

        channel.on('broadcast', { event: 'display-to-control' }, ({ payload }) => {
            const { type, data } = payload;
            if (type === "UPDATE_QUIZ_ACTIVE") {
                for (let i = 1; i <= 12; i++) {
                    const btn = document.getElementById(`btnQuiz${i}`);
                    if (btn) btn.classList.remove("active");
                }
                if(data >= 0) {
                    const activeBtn = document.getElementById(`btnQuiz${data + 1}`);
                    if (activeBtn) activeBtn.classList.add("active");
                }
                const targetQuizzes = [2, 3, 4, 8, 9, 10, 11];
                if (targetQuizzes.includes(data)) {
                    document.getElementById("alphabetSection").style.display = "block";
                } else {
                    document.getElementById("alphabetSection").style.display = "none";
                }
                if ([9, 10, 11].includes(data)) {
                    document.getElementById("extraLettersSection").style.display = "block";
                } else {
                    document.getElementById("extraLettersSection").style.display = "none";
                }
                document.querySelectorAll(".btn-letter").forEach(btn => btn.disabled = false);
                document.getElementById("numCells").value = "";
                document.getElementById("childTextBoxes").innerHTML = "";
            }
            if (type === "UPDATE_CTRL_ACTIVE") {
                document.getElementById("startBtn").classList.remove("active");
                document.getElementById("pauseBtn").classList.remove("active");
                document.getElementById("playBtn").classList.remove("active");
                if (data) document.getElementById(data).classList.add("active");
                if (data === "startBtn" || data === "playBtn") isTossupRunning = true;
                else if (data === "pauseBtn" || data === null) {
                    isTossupRunning = false;
                    clearTimeout(tossupTimeout);
                }
            }
            if (type === "FILL_POSITIONS") {
                document.getElementById("numCells").value = data.length;
                generateChildTextBoxes(data);
            }
        });

        function sendManualText() {
            const txt = document.getElementById("manualTextInput").value.toUpperCase().replace(/\r/g, "");
            const lines = txt.split("\n").map(l => l.trim()).filter(l => l !== "");
            if (lines.length === 0) { showCustomAlert("Vui lòng nhập văn bản."); return; }
            if (lines.length > 4) { showCustomAlert("Tối đa 4 dòng."); return; }
            const maxLen = [12, 14, 14, 12];
            for (let i = 0; i < lines.length; i++) {
                if (lines[i].length > maxLen[i]) {
                    showCustomAlert(`Dòng ${i + 1} chỉ được tối đa ${maxLen[i]} ký tự.`);
                    return;
                }
            }
            sendCmd("SHOW_MANUAL_TEXT", lines);
        }

        let importedQuizzes = [];
        function handleExcel(input) {
            const file = input.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function (e) {
                const data = new Uint8Array(e.target.result);
                const workbook = XLSX.read(data, { type: 'array' });
                importedQuizzes = [];
                for (let i = 0; i < Math.min(workbook.SheetNames.length, 12); i++) {
                    importedQuizzes.push(parseExcelGrid(workbook.Sheets[workbook.SheetNames[i]]));
                }
                showCustomAlert(`Thành công! Đã nạp ${importedQuizzes.length} đề.`);
            };
            reader.readAsArrayBuffer(file);
        }

        function parseExcelGrid(sheet) {
            let letters = [];
            for (let c = 1; c <= 12; c++) { let cellRef = XLSX.utils.encode_cell({ r: 1, c: c }); letters.push(sheet[cellRef] ? String(sheet[cellRef].v) : ""); }
            for (let c = 0; c <= 13; c++) { let cellRef = XLSX.utils.encode_cell({ r: 2, c: c }); letters.push(sheet[cellRef] ? String(sheet[cellRef].v) : ""); }
            for (let c = 0; c <= 13; c++) { let cellRef = XLSX.utils.encode_cell({ r: 3, c: c }); letters.push(sheet[cellRef] ? String(sheet[cellRef].v) : ""); }
            for (let c = 1; c <= 12; c++) { let cellRef = XLSX.utils.encode_cell({ r: 4, c: c }); letters.push(sheet[cellRef] ? String(sheet[cellRef].v) : ""); }
            return letters;
        }

        function loadQuizFromExcel(quizIndex) {
            if (importedQuizzes.length === 0) { showCustomAlert("Vui lòng nạp file Excel trước!"); return; }
            const quizLetters = importedQuizzes[quizIndex];
            if (!quizLetters) { showCustomAlert("Không tìm thấy dữ liệu đề!"); return; }
            controlActiveQuizLetters = quizLetters;
            controlRevealedStates = new Array(52).fill(false);
            clearTimeout(tossupTimeout);
            isTossupRunning = false;
            sendCmd('LOAD_QUIZ', { index: quizIndex, letters: quizLetters });
            setTimeout(updateScoreboard, 300);
        }

        function controlRevealRandomCell() {
            if (!isTossupRunning) return;
            let hiddenIndices = [];
            controlActiveQuizLetters.forEach((letter, i) => {
                if (letter !== "" && letter !== " " && letter && !controlRevealedStates[i]) hiddenIndices.push(i);
            });
            if (hiddenIndices.length === 0) { isTossupRunning = false; clearTimeout(tossupTimeout); sendCmd('STOP_TOSSUP_MUSIC'); return; }
            const randomIndex = hiddenIndices[Math.floor(Math.random() * hiddenIndices.length)];
            controlRevealedStates[randomIndex] = true;
            sendCmd('TOSSUP_REVEAL_CELL', { absoluteIndex: randomIndex + 1 });
            tossupTimeout = setTimeout(controlRevealRandomCell, Math.random() * (1500 - 1000) + 1000);
        }

        function clickStartTossup() {
            if (controlActiveQuizLetters.length === 0) { showCustomAlert("Vui lòng nạp đề bài trước!"); return; }
            clearTimeout(tossupTimeout);
            controlRevealedStates = new Array(52).fill(false);
            isTossupRunning = true;
            sendCmd('START_TOSSUP');
            controlRevealRandomCell();
        }

        function clickPauseTossup() { isTossupRunning = false; clearTimeout(tossupTimeout); sendCmd('PAUSE_TOSSUP'); sendCmd('STOP_TOSSUP_MUSIC'); }
        function clickPlayTossup() { if (isTossupRunning) return; isTossupRunning = true; sendCmd('PLAY_TOSSUP'); controlRevealRandomCell(); }

        const vietnameseAlphabet = ["A", "Ă", "Â", "B", "C", "D", "Đ", "E", "Ê", "G", "H", "I", "K", "L", "M", "N", "O", "Ô", "Ơ", "P", "Q", "R", "S", "T", "U", "Ư", "V", "X", "Y"];
        const container = document.getElementById("alphabetContainer");
        vietnameseAlphabet.forEach(letter => {
            const btn = document.createElement("button");
            btn.className = "btn-letter";
            btn.id = `btn-char-${letter}`;
            btn.textContent = letter;
            btn.onclick = () => { btn.disabled = true; sendCmd('GUESS_LETTER', letter); };
            container.appendChild(btn);
        });

        function solveTossUp() { isTossupRunning = false; clearTimeout(tossupTimeout); sendCmd('REVEAL_ALL'); sendCmd('STOP_TOSSUP_MUSIC'); }
        function showCustomAlert(message) { document.getElementById("popupMessage").textContent = message; document.getElementById("customPopup").style.display = "flex"; }
        function closePopup() { document.getElementById("customPopup").style.display = "none"; }
        function sendCmd(type, data = null) { channel.send({ type: 'broadcast', event: 'control-to-display', payload: { type: type, data: data } }); }

        function generateChildTextBoxes(autoValues = []) {
            const num = parseInt(document.getElementById("numCells").value) || 0;
            const container = document.getElementById("childTextBoxes");
            container.innerHTML = "";
            for (let i = 0; i < num; i++) {
                const input = document.createElement("input");
                input.type = "number";
                input.style.cssText = "font-weight: bold; width: 28px; padding: 4px; text-align: center; border-radius: 4px; border:1px solid #555; background:#1a1a1a; color:#fff; font-size:11px;";
                input.className = "child-pos-input";
                if (autoValues[i] !== undefined) input.value = autoValues[i];
                container.appendChild(input);
            }
        }

        function triggerSequence(actionType) {
            const inputs = document.querySelectorAll(".child-pos-input");
            let positions = [];
            inputs.forEach(input => {
                const val = parseInt(input.value);
                if (!isNaN(val) && val >= 1 && val <= 52) positions.push(val);
            });
            if (positions.length > 0) { positions.sort((a, b) => a - b); sendCmd(actionType, positions); }
        }

        function confirmExtraLetters() {
            const inputs = document.querySelectorAll(".extra-letter-input");
            let letters = [];
            inputs.forEach(inp => { const val = inp.value.trim().toUpperCase(); if (val !== "") letters.push(val); });
            if (letters.length === 0) { showCustomAlert("Vui lòng nhập ít nhất 1 chữ cái!"); return; }
            sendCmd("GUESS_MULTI_LETTERS", letters);
        }
        function clearExtraLetters() { document.querySelectorAll(".extra-letter-input").forEach(inp => inp.value = ""); }
    </script>
</body>

</html>
