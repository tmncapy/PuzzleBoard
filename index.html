<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Màn Hình Hiển Thị Ô Chữ (Broadcast)</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        /* Tối ưu hóa không gian hiển thị chuẩn Full HD 16:9 */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #000;
            overflow: hidden;
            width: 1920px;
            height: 1080px;
            position: relative;
        }

        /* Khung chứa bảng thiết kế gốc */
        #board {
            width: 1920px;
            height: 1080px;
            background-image: url('bangochu.png');
            background-position: center;
            background-repeat: no-repeat;
            background-size: 100% 100%;
            position: relative;
            z-index: 1;
        }

        /* Định dạng các ô chữ động theo % tọa độ */
        .cell {
            position: absolute;
            width: 5.6%;    /* Tính toán co giãn tỷ lệ đẹp theo bề ngang 1920px */
            height: 10.4%;  /* Tính toán co giãn tỷ lệ đẹp theo chiều dọc 1080px */
            display: flex;
            align-items: center;
            justify-content: center;
            
            /* Thuộc tính Font chữ dày, chống răng cưa và mất dấu tiếng Việt */
            font-family: 'Arial', 'Helvetica', sans-serif;
            font-weight: 900;
            font-size: 60px;
            color: #ffffff;
            text-shadow: 3px 3px 5px rgba(0, 0, 0, 0.9);
            text-transform: uppercase;
            
            line-height: 1;
            overflow: hidden;
            transition: all 0.2s ease-in-out;
        }

        /* Định dạng class riêng cho các ô chữ nhập thủ công từ 4 hàng */
        .cell-manual {
            color: #ffffff; /* Bạn có thể đổi sang màu khác (ví dụ: vàng #ffcc00) nếu muốn phân biệt */
        }

        /* Khung thiết lập ảnh bìa chờ của chương trình */
        #programThumbnail {
            position: absolute;
            top: 0;
            left: 0;
            width: 1920px;
            height: 1080px;
            z-index: 9999;
            object-fit: cover;
            display: none; /* Mặc định ẩn, hiện lên khi nhận lệnh SHOW_THUMBNAIL */
        }
    </style>
</head>
<body>

    <img id="programThumbnail" src="thumbnail.png" alt="Program Thumbnail">
